[env:esp32-s3-devkitm-1]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I ${PROJECT_INCLUDE_DIR}
monitor_dtr = 1

# Exclude the hwtest sketch so main.cpp is the only entry point
build_src_filter = +<*> -<main_hwtest.cpp>

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

# =============================================================================
# hwtest — Hardware Validation
# =============================================================================
# Compiles only main_hwtest.cpp (excludes main.cpp).
# Upload : pio run -e hwtest -t upload
# Monitor: pio device monitor -e hwtest
# =============================================================================
[env:hwtest]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I ${PROJECT_INCLUDE_DIR}
monitor_dtr = 1

# Only compile the validation sketch; exclude production main.cpp
build_src_filter = +<*> -<main.cpp>

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
