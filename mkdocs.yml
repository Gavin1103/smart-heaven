site_name: "Smart Heaven"
site_description: "A solarpunk–futuristic smart city built by our learning group: embedded/robotics + backend working together."

theme:
    name: material
    custom_dir: mdocotion/
    sidebar_color: '#f1f5f9'
    logo: assets/logo.svg
    favicon: "data:image/x-icon;base64,"
    palette:
        - scheme: default
          primary: teal
          accent: lime
          toggle:
              icon: material/weather-night
              name: Switch to dark mode
        - scheme: slate
          primary: teal
          accent: lime
          toggle:
              icon: material/weather-sunny
              name: Switch to light mode
    features:
        - navigation.indexes
        - navigation.top
        - content.tabs.link
        - content.code.copy
        - toc.integrate

plugins:
    - search
    - mermaid2
    - awesome-pages
    - mkdocs-video
    - section-index
    - autolinks
    - macros:
          modules: [mkdocs_macros_mdocotion]

markdown_extensions:
    - attr_list
    - md_in_html
    - fenced_code
    - pymdownx.highlight:
          linenums: true
          use_pygments: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences
    - admonition
    - pymdownx.details
    - pymdownx.tabbed:
        alternate_style: true
    - toc:
          permalink: true
    - pymdownx.emoji:
          emoji_index: !!python/name:materialx.emoji.twemoji
          emoji_generator: !!python/name:materialx.emoji.to_svg



